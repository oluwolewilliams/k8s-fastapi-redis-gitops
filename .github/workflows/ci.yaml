name: Build, Push and Update Helm

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Docker secrets
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "DOCKER_USERNAME secret is missing"
            exit 1
          fi
          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "DOCKER_PASSWORD secret is missing"
            exit 1
          fi
          echo "Docker secrets are present"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/python-api:${{ github.sha }} .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/python-api:${{ github.sha }}

      - name: Update Helm values
        run: |
          sed -i 's|repository:.*|repository: chancellor4/python-api|' helm/python-api-chart/values.yaml
          sed -i 's|tag:.*|tag: "'"${{ github.sha }}"'"|' helm/python-api-chart/values.yaml
          sed -i 's|pullPolicy:.*|pullPolicy: Always|' helm/python-api-chart/values.yaml

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "oluwolewilliams3@gmail.com"
          git add helm/python-api-chart/values.yaml
          git commit -m "Update image tag to ${{ github.sha }}" || echo "No changes to commit"
          git push