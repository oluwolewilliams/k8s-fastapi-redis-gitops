name: Build, Push and Update Helm

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build Docker image
      - name: Build image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}chancellor4/python-api:${{ github.sha }} .

      # 4. Push image
      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}chancellor4/python-api:${{ github.sha }}

      # 5. Update Helm values.yaml with new image tag
      - name: Update Helm values
        run: |
          sed -i "s/tag:.*/tag: \"${{ github.sha }}\"/" helm/python-api-chart/values.yaml

      # 6. Commit updated values.yaml
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "oluwolewiliams3@gmail.com"
          git add helm/python-api-chart/values.yaml
          git commit -m "Update image tag to ${{ github.sha }}" || echo "No changes to commit"
          git push