{{- if .Values.debugPod.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: debug-client
  labels:
    {{- include "python-api-chart.labels" . | nindent 4 }}
spec:
  containers:
    - name: debug-client
      image: {{ .Values.debugPod.image }}
      command:
        {{- toYaml .Values.debugPod.command | nindent 8 }}
  restartPolicy: Never
{{- end }}