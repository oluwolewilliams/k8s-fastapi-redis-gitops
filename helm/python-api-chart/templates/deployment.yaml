apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-api
  labels:
    {{- include "python-api-chart.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: python-api
  template:
    metadata:
      labels:
        app: python-api
    spec:
      containers:
        - name: python-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          envFrom:
            - configMapRef:
                name: redis-cm
            {{- if .Values.redis.auth.enabled }}
            - secretRef:
                name: redis-secret
            {{- end }}